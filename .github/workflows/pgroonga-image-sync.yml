name: Sync PGroonga Image

on:
  workflow_dispatch:
  schedule:
    - cron: "13 2 * * *"

permissions:
  contents: read
  packages: write

env:
  BASE_IMAGE: postgres:17-bookworm
  TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/pgroonga-pgrepack
  DOCKERFILE_PATH: Dockerfile.pgroonga-pgrepack

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream digest
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect "${BASE_IMAGE}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ -z "${digest}" ]]; then
            echo "Failed to resolve upstream digest"
            exit 1
          fi
          short="${digest#sha256:}"
          short="${short:0:12}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "short=${short}" >> "$GITHUB_OUTPUT"
          echo "Found upstream digest: ${digest}"

      - name: Check if this digest was already built
        id: probe
        shell: bash
        run: |
          set +e
          docker buildx imagetools inspect "${TARGET_IMAGE}:upstream-${{ steps.upstream.outputs.short }}" >/dev/null 2>&1
          status=$?
          set -e
          if [[ $status -eq 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists for upstream digest; skipping build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        if: steps.probe.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TARGET_IMAGE }}
          tags: |
            type=raw,value=17
            type=raw,value=latest
            type=raw,value=upstream-${{ steps.upstream.outputs.short }}
            type=raw,value=build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=PGroonga + pg_repack custom image
            org.opencontainers.image.base.digest=${{ steps.upstream.outputs.digest }}

      - name: Build and push
        if: steps.probe.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        shell: bash
        run: |
          if [[ "${{ steps.probe.outputs.skip }}" == "true" ]]; then
            echo "No update. Upstream digest already published as upstream-${{ steps.upstream.outputs.short }}."
          else
            echo "Published ${TARGET_IMAGE}:17 (upstream=${{ steps.upstream.outputs.digest }})."
          fi
